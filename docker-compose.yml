services:
  abs-sync:
    build: .
    container_name: abs-sync-hc
    restart: unless-stopped
    environment:
      ABS_URL: ${ABS_URL?:}
      ABS_TOKEN: ${ABS_TOKEN?:}
      HARDCOVER_TOKEN: ${HARDCOVER_TOKEN?:}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 3 * * *}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-Europe/Prague}
      DB_PATH: /data/app.db
      PORT: 8080
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TO: ${SMTP_TO:-}
    volumes:
      - ./.data:/data
