services:
  abs-sync:
    build: .
    container_name: abs-sync
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ABS_URL: ${ABS_URL?:}
      ABS_TOKEN: ${ABS_TOKEN?:}
      HARDCOVER_TOKEN: ${HARDCOVER_TOKEN?:}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 3 * * *}
      CRON_TIMEZONE: ${CRON_TIMEZONE:-Europe/Prague}
      DB_PATH: /data/app.db
      PORT: 8080
    volumes:
      - ./.data:/data
